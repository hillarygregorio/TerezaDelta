        <main>
            <frameset>
                <div class="form-container">
                    <form action="" method="get">
                        <legend>Média do Aluno</legend><br>
                        <input type="number" name="Nota1" id="Nota1" placeholder="Nota 1" step="0.01"><br><br>
                        <input type="number" name="Nota2" id="Nota2" placeholder="Nota 2" step="0.01"><br><br>
                        <input type="number" name="Nota3" id="Nota3" placeholder="Nota 3" step="0.01"><br><br>
              
                        <input type="button" value="Media" onclick="fMedia()">
                        <input type="reset" value="Limpar">    
                     </form>
                </div>
              
               <p id="status" style="margin-top: 20px; font-size: 1.2em; color: black;"></p>
        
            </frameset><br>

            <script>
                function fMedia() {
    let Nota1 = parseFloat(document.getElementById("Nota1").value);
    let Nota2 = parseFloat(document.getElementById("Nota2").value);
    let Nota3 = parseFloat(document.getElementById("Nota3").value);

    let Media = (Nota1 + Nota2 + Nota3) / 3;
    let Conselho;
    let cor;

    if (Media >= 7) {
        Conselho = "Aprovado!";
        cor = "green";
    } else if (Media >= 5) {
        Conselho = "Recuperação!";
        cor = "blue";
    } else {
        Conselho = "Retido!";
        cor = "red";
    }

    alert(`Média: ${Media.toFixed(2)}\nStatus: ${Conselho}`);
}


            </script>
